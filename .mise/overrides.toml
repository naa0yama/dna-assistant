# Project-specific task overrides.
# Tasks defined here take precedence over tasks.toml because this file
# appears FIRST in the task_config.includes array in mise.toml.

["check:core"]
description = "Compile check (cross-platform crates only, DevContainer OK)"
run = "cargo check -p dna-detector --all-targets --all-features"

[test]
description = "Run tests (excludes Tauri app — WebView2 DLL unavailable in test harness)"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "" }
run = "cargo test --workspace --all-targets --exclude dna-assistant"

["test:core"]
description = "Run tests (cross-platform crates only, DevContainer OK)"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "" }
run = "cargo test -p dna-detector --all-targets"

[coverage]
description = "Generate LCOV coverage report and verify thresholds"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:19999" }
run = """
rustup component add llvm-tools-preview --toolchain nightly-2026-01-15

cargo +nightly-2026-01-15 llvm-cov --workspace --all-features --fail-under-lines 90 --exclude dna-assistant --exclude dna-capture
cargo +nightly-2026-01-15 llvm-cov --workspace --all-features --lcov --output-path target/lcov.info --exclude dna-assistant --exclude dna-capture
"""

["coverage:html"]
description = "Generate HTML coverage report and open"
env = { OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:19999" }
run = """
rustup component add llvm-tools-preview --toolchain nightly-2026-01-15

cargo +nightly-2026-01-15 llvm-cov --workspace --all-features --html --open --exclude dna-assistant --exclude dna-capture
"""

["clippy:core"]
description = "Run clippy lints (cross-platform crates only, DevContainer OK)"
run = "cargo clippy -p dna-detector --all-targets --all-features -- -D warnings"

["miri:core"]
description = "Run Miri (cross-platform crates only, DevContainer OK)"
run = "cargo +nightly miri test -p dna-detector"

["tauri:dev"]
description = "Start Tauri dev mode (Windows only)"
run = "cargo tauri dev"

["tauri:build"]
description = "Build Tauri release bundle (Windows only)"
run = "cargo tauri build"
