<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-base-200">
  <div class="container mx-auto p-4 max-w-md">
    <h1 class="text-2xl font-bold mb-4">DNA Assistant</h1>

    <div class="card bg-base-100 shadow-xl mb-4">
      <div class="card-body">
        <h2 class="card-title text-sm">Status</h2>
        <div class="flex items-center gap-2">
          <span class="badge badge-outline" id="status-badge">Idle</span>
        </div>
      </div>
    </div>

    <div class="card bg-base-100 shadow-xl mb-4">
      <div class="card-body">
        <h2 class="card-title text-sm">Connection Test</h2>
        <div class="form-control">
          <div class="input-group flex gap-2">
            <input type="text" id="greet-input" placeholder="Your name"
                   class="input input-bordered input-sm flex-1">
            <button class="btn btn-primary btn-sm" id="greet-btn">Greet</button>
          </div>
        </div>
        <p id="greet-msg" class="text-sm mt-2 text-base-content/70"></p>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
